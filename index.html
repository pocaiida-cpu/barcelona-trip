<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Barcelona Trip 2025</title>
  <style>
    :root{--bg:#fff8f3;--card:#fff;--ink:#2f2a27;--muted:#8c7f76;--line:#eadfd8;--accent:#ef7d62;--accent2:#f5b66f;--green:#6aae83;--shadow:0 12px 30px rgba(70,45,30,.10)}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#fff1e9,var(--bg));font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
    .loading{position:fixed;inset:0;background:rgba(255,248,243,.92);display:none;align-items:center;justify-content:center;z-index:99;font-weight:700}.loading.show{display:flex}
    .wrap{max-width:980px;margin:0 auto;padding:22px 14px 90px}.hero{background:linear-gradient(135deg,#ff9d78,#f4c56f);color:white;border-radius:28px;padding:24px;box-shadow:var(--shadow)}
    h1{margin:0 0 8px;font-size:32px}.subtitle{opacity:.92;margin:4px 0}.members{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.member-badge{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.45);border-radius:999px;padding:6px 10px;cursor:pointer}.member-badge.active{background:white;color:var(--accent);font-weight:800}.avatar{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:#fff;color:#ef7d62;font-weight:800}.sync-status{margin-top:12px;font-size:13px}.realtime-dot{display:inline-block;width:8px;height:8px;background:#7be495;border-radius:50%;margin-right:6px}
    .tabs{position:sticky;top:0;background:rgba(255,248,243,.9);backdrop-filter:blur(10px);z-index:5;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 0}.tab{border:0;background:white;border-radius:16px;padding:11px 8px;box-shadow:var(--shadow);font-weight:800;color:var(--muted);cursor:pointer}.tab.active{background:var(--ink);color:white}.page{display:none}.page.active{display:block}.section-title{display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px;font-size:22px;font-weight:900}.btn-add,.btn-post,.btn-submit{border:0;background:var(--accent);color:white;border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.btn-cancel{border:0;background:#eee2da;color:var(--ink);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.card,.note-card,.expense-card,.wish-card{background:white;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
    .day-card{margin-bottom:12px;overflow:hidden}.day-header{display:flex;justify-content:space-between;align-items:center;background:#fff2eb;padding:13px 16px}.day-num{font-weight:900}.schedule-item{display:grid;grid-template-columns:68px 1fr auto;gap:10px;padding:14px 14px;border-top:1px solid var(--line);align-items:start}.time-col{font-size:13px;color:var(--muted);font-weight:800}.item-title{font-weight:900}.item-sub,.meta{font-size:12px;color:var(--muted);margin-top:4px}.actions{display:flex;gap:6px}.icon-btn{border:1px solid var(--line);background:white;border-radius:10px;padding:6px 8px;cursor:pointer}.tag{display:inline-block;margin-top:7px;padding:4px 8px;border-radius:999px;background:#fff0d2;color:#a55f00;font-size:11px;font-weight:800}.add-to-day{width:100%;border:0;background:#fffaf7;padding:12px;color:var(--accent);font-weight:900;cursor:pointer}
    .wish-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.wish-card{padding:16px;position:relative}.wish-emoji{font-size:30px}.wish-name{font-weight:900;margin-top:8px}.wish-cat,.wish-note{font-size:13px;color:var(--muted);margin-top:5px;white-space:pre-wrap}.wish-note{background:#fff8f3;border-radius:12px;padding:8px}.wish-vote-row{display:flex;align-items:center;gap:8px;margin-top:10px}.vote-btn{border:0;background:#ffe7e0;border-radius:999px;width:34px;height:34px;cursor:pointer}.add-wish-card{border:2px dashed var(--line);border-radius:22px;display:grid;place-items:center;min-height:160px;color:var(--accent);font-weight:900;cursor:pointer;background:#fffaf7}.add-wish-card span{font-size:34px}.add-wish-card p{margin:0 0 18px}
    .note-card{padding:14px;margin-bottom:10px;position:relative}.note-header{display:flex;gap:8px;align-items:center}.note-name{font-weight:900}.note-time{font-size:12px;color:var(--muted)}.note-text{margin-top:10px;white-space:pre-wrap}.note-compose{padding:14px;margin-top:14px}.note-compose textarea, input, select, textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:white;font:inherit}.note-compose-row{display:flex;gap:8px;margin-top:10px}.name-select{max-width:180px}
    .expense-card{display:grid;grid-template-columns:44px 1fr auto auto;gap:10px;align-items:center;padding:14px;margin-bottom:10px}.expense-emoji{font-size:26px}.expense-title{font-weight:900}.expense-sub{font-size:12px;color:var(--muted);margin-top:4px}.expense-amount{font-weight:900;font-size:18px;text-align:right}.status-badge{display:inline-block;margin-top:7px;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800}.status-pending{background:#fff0d2;color:#a55f00}.status-settled{background:#e9f7ee;color:#277346}.empty-state{text-align:center;color:var(--muted);padding:28px;background:white;border-radius:22px;border:1px solid var(--line)}
    .share{margin-top:18px;background:white;border-radius:18px;padding:12px;border:1px solid var(--line);display:flex;gap:8px;align-items:center}.share input{font-size:12px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:white;padding:10px 16px;border-radius:999px;transition:.2s;z-index:100}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center;z-index:50}.modal-bg.open{display:flex}.modal{background:white;width:min(620px,100%);max-height:90vh;overflow:auto;border-radius:26px 26px 0 0;padding:20px}.modal h3{margin-top:0}.modal label{display:block;font-size:12px;font-weight:900;color:var(--muted);margin:12px 0 6px}.modal-row{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
    @media(max-width:640px){.schedule-item{grid-template-columns:56px 1fr}.actions{grid-column:2}.expense-card{grid-template-columns:36px 1fr auto}.expense-card .actions{grid-column:2/4}.hero{border-radius:22px}h1{font-size:26px}}
  </style>
</head>
<body>
<div id="loading" class="loading show">データを読み込み中…</div><div id="toast" class="toast"></div>
<div class="wrap">
  <div class="hero">
    <h1>Barcelona Trip 2025</h1>
    <div class="subtitle">Jun 30 – Aug 1 · 33 days</div><div class="subtitle">Carrer de Girona 108, Barcelona 08009</div>
    <div id="members" class="members"></div><div class="sync-status"><span class="realtime-dot"></span>リアルタイム同期中</div>
  </div>
  <div class="share"><span style="font-size:12px;font-weight:900;color:var(--muted)">Share link:</span><input id="shareUrl" readonly><button class="btn-cancel" onclick="copyUrl()">Copy</button></div>
  <div class="tabs"><button class="tab active" onclick="switchTab('schedule',this)">Schedule</button><button class="tab" onclick="switchTab('wishlist',this)">Wish List</button><button class="tab" onclick="switchTab('notes',this)">Notes</button><button class="tab" onclick="switchTab('payments',this)">Payment</button></div>
  <section class="page active" id="page-schedule"><div class="section-title">Schedule <button class="btn-add" onclick="openScheduleModal()">＋ Add</button></div><div id="scheduleList"></div></section>
  <section class="page" id="page-wishlist"><div class="section-title">Wish List <button class="btn-add" onclick="openWishModal()">＋ Add</button></div><div class="wish-grid" id="wishGrid"></div></section>
  <section class="page" id="page-notes"><div class="section-title">Notes</div><div id="notesList"></div><div class="note-compose card"><textarea id="noteInput" placeholder="コメントを入力…" rows="3"></textarea><div class="note-compose-row"><select class="name-select" id="noteAuthor"></select><button class="btn-post" onclick="postNote()">Post</button></div></div></section>
  <section class="page" id="page-payments"><div class="section-title">Payment <button class="btn-add" onclick="openPaymentModal()">＋ Add</button></div><div id="paymentList"></div></section>
</div>

<div class="modal-bg" id="modal-schedule"><div class="modal"><h3 id="scheduleModalTitle">スケジュールに追加</h3><input type="hidden" id="s-key"><label>場所・アクティビティ</label><input id="s-title"><label>日程</label><select id="s-day"></select><label>時間（任意）</label><input id="s-time" placeholder="例: 10:00 / AM / PM"><label>メモ（任意）</label><textarea id="s-note" rows="3"></textarea><label>タグ</label><select id="s-tag"><option value="">なし</option><option value="must">Must-see!</option><option value="arch">Architecture</option><option value="food">Food</option><option value="gaudi">Gaudí</option></select><div class="modal-row"><button class="btn-cancel" onclick="closeModal('schedule')">キャンセル</button><button class="btn-submit" onclick="saveSchedule()">保存</button></div></div></div>
<div class="modal-bg" id="modal-wish"><div class="modal"><h3 id="wishModalTitle">Wish List に追加</h3><input type="hidden" id="w-key"><label>場所名</label><input id="w-name"><label>カテゴリ</label><select id="w-cat"><option>Architecture</option><option>Food & Dining</option><option>Art & Culture</option><option>Beach & Nature</option><option>Shopping</option><option>Other</option></select><label>Note</label><textarea id="w-note" rows="3" placeholder="メモ、予約URL、候補理由など"></textarea><label>絵文字</label><input id="w-emoji" maxlength="2" placeholder="✨"><div class="modal-row"><button class="btn-cancel" onclick="closeModal('wish')">キャンセル</button><button class="btn-submit" onclick="saveWish()">保存</button></div></div></div>
<div class="modal-bg" id="modal-note"><div class="modal"><h3>Noteを編集</h3><input type="hidden" id="n-key"><label>Note</label><textarea id="n-text" rows="5"></textarea><label>入力者</label><select id="n-author"></select><div class="modal-row"><button class="btn-cancel" onclick="closeModal('note')">キャンセル</button><button class="btn-submit" onclick="saveNoteEdit()">保存</button></div></div></div>
<div class="modal-bg" id="modal-payment"><div class="modal"><h3 id="paymentModalTitle">Payment に追加</h3><input type="hidden" id="p-key"><label>内容</label><input id="p-desc"><label>金額 (€)</label><input type="number" id="p-amount" step="0.01"><label>支払者</label><select id="p-paidby"></select><label>絵文字</label><input id="p-emoji" maxlength="2" placeholder="💳"><label>ステータス</label><select id="p-status"><option value="pending">Pending</option><option value="settled">Settled</option></select><div class="modal-row"><button class="btn-cancel" onclick="closeModal('payment')">キャンセル</button><button class="btn-submit" onclick="savePayment()">保存</button></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey:"AIzaSyDgsbX6cW9xjQah8MTbZrzVrabNjSksUGU", authDomain:"barcelona-trip-cba1e.firebaseapp.com", databaseURL:"https://barcelona-trip-cba1e-default-rtdb.firebaseio.com", projectId:"barcelona-trip-cba1e", storageBucket:"barcelona-trip-cba1e.firebasestorage.app", messagingSenderId:"1088189335983", appId:"1:1088189335983:web:4c7a14a4b8fd079318075a", measurementId:"G-43Z9Y7K5B2" };
const app = initializeApp(firebaseConfig); const db = getDatabase(app);
const MEMBERS = ['Sayaka','Kasumi','Mari','Jennfer','Yuka','Mayumi'];
const dayNames = {1:'Day 1 Tue, Jun 30',2:'Day 2 Wed, Jul 1',3:'Day 3 Thu, Jul 2',4:'Day 4 Fri, Jul 3',5:'Day 5 Sat, Jul 4',6:'Day 6+',33:'Day 33 Sat, Aug 1'};
const dayOrder = [1,2,3,4,5,6,33]; const tagLabel={must:'Must-see!',arch:'Architecture',food:'Food',gaudi:'Gaudí'};
window._currentUser = 'Sayaka'; let scheduleData={}, wishData={}, notesData={}, paymentData={};
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); } window.showToast=toast;
function memberOptions(){return MEMBERS.map(m=>`<option>${m}</option>`).join('')}
function meta(item){ const by=item.addedBy||item.author||item.paidBy||'Unknown'; return `Added by ${esc(by)}` + (item.updatedBy?` · Updated by ${esc(item.updatedBy)}`:''); }
function initUI(){ $('members').innerHTML=MEMBERS.map((m,i)=>`<div class="member-badge ${i===0?'active':''}" onclick="selectMember(this,'${m}')"><div class="avatar">${m[0]}</div>${m}</div>`).join(''); ['noteAuthor','n-author','p-paidby'].forEach(id=>$(id).innerHTML=memberOptions()); $('shareUrl').value=location.href; $('s-day').innerHTML=dayOrder.map(d=>`<option value="${d}">${dayNames[d]}</option>`).join(''); }
window.selectMember=(el,name)=>{document.querySelectorAll('.member-badge').forEach(b=>b.classList.remove('active')); el.classList.add('active'); window._currentUser=name; $('noteAuthor').value=name;};
window.switchTab=(tab,el)=>{document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); $('page-'+tab).classList.add('active'); el.classList.add('active');};
window.openModal=type=> $('modal-'+type).classList.add('open'); window.closeModal=type=> $('modal-'+type).classList.remove('open'); document.querySelectorAll('.modal-bg').forEach(bg=>bg.onclick=e=>{if(e.target===bg)bg.classList.remove('open')}); window.copyUrl=()=>navigator.clipboard.writeText(location.href).then(()=>toast('URLをコピーしました！'));

function renderSchedule(data){ scheduleData=data||{}; const grouped={}; dayOrder.forEach(d=>grouped[d]=[]); Object.entries(scheduleData).forEach(([key,item])=>{const d=item.day||6;(grouped[d]||(grouped[d]=[])).push({key,...item})}); $('scheduleList').innerHTML=dayOrder.map(day=>{const items=(grouped[day]||[]).sort((a,b)=>(a.time||'').localeCompare(b.time||'')); return `<div class="card day-card"><div class="day-header"><div><div class="day-num">${day===6?'Day 6+':dayNames[day].split(' ').slice(0,2).join(' ')}</div><div class="meta">${day===6?'Jul 5–31':dayNames[day].split(' ').slice(2).join(' ')}</div></div></div><div>${items.length?items.map(item=>`<div class="schedule-item"><div class="time-col">${esc(item.time||'')}</div><div><div class="item-title">${esc(item.title)}</div>${item.note?`<div class="item-sub">${esc(item.note)}</div>`:''}${item.tag?`<span class="tag">${esc(tagLabel[item.tag]||item.tag)}</span>`:''}<div class="meta">${meta(item)}</div></div><div class="actions"><button class="icon-btn" onclick="editSchedule('${item.key}')">Edit</button><button class="icon-btn" onclick="deleteSchedule('${item.key}')">✕</button></div></div>`).join(''):`<div class="empty-state">TBD — Let's plan together!</div>`}</div><button class="add-to-day" onclick="openScheduleModal(${day})">＋ Add to schedule</button></div>`}).join(''); }
window.openScheduleModal=(day)=>{ $('scheduleModalTitle').textContent='スケジュールに追加'; ['s-key','s-title','s-time','s-note'].forEach(id=>$(id).value=''); $('s-tag').value=''; $('s-day').value=day||1; openModal('schedule'); };
window.editSchedule=key=>{const i=scheduleData[key]; if(!i)return; $('scheduleModalTitle').textContent='スケジュールを編集'; $('s-key').value=key; $('s-title').value=i.title||''; $('s-day').value=i.day||6; $('s-time').value=i.time||''; $('s-note').value=i.note||''; $('s-tag').value=i.tag||''; openModal('schedule');};
window.saveSchedule=()=>{const title=$('s-title').value.trim(); if(!title)return toast('場所名を入力してください'); const key=$('s-key').value; const item={title,day:+$('s-day').value,time:$('s-time').value.trim(),note:$('s-note').value.trim(),tag:$('s-tag').value,updatedBy:window._currentUser,updatedAt:Date.now()}; key?update(ref(db,'schedule/'+key),item):push(ref(db,'schedule'),{...item,addedBy:window._currentUser,createdAt:Date.now()}); closeModal('schedule'); toast('保存しました');};
window.deleteSchedule=key=>{if(confirm('削除しますか？')) remove(ref(db,'schedule/'+key));}; onValue(ref(db,'schedule'),s=>renderSchedule(s.val()));

function renderWish(data){ wishData=data||{}; const items=Object.entries(wishData).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)); $('wishGrid').innerHTML=items.map(([key,item])=>`<div class="wish-card"><div class="wish-emoji">${esc(item.emoji||'✨')}</div><div class="wish-name">${esc(item.name)}</div><div class="wish-cat">${esc(item.cat||'')}</div>${item.note?`<div class="wish-note">${esc(item.note)}</div>`:''}<div class="wish-vote-row"><button class="vote-btn" onclick="voteWish('${key}',${item.votes||0})">♡</button><span>${item.votes||0} votes</span></div><div class="meta">${meta(item)}</div><div class="actions" style="margin-top:10px"><button class="icon-btn" onclick="editWish('${key}')">Edit</button><button class="icon-btn" onclick="deleteWish('${key}')">✕</button></div></div>`).join('')+`<div class="add-wish-card" onclick="openWishModal()"><span>＋</span><p>Add a place</p></div>`; }
window.openWishModal=()=>{ $('wishModalTitle').textContent='Wish List に追加'; ['w-key','w-name','w-note','w-emoji'].forEach(id=>$(id).value=''); $('w-cat').value='Architecture'; openModal('wish');};
window.editWish=key=>{const i=wishData[key]; if(!i)return; $('wishModalTitle').textContent='Wish Listを編集'; $('w-key').value=key; $('w-name').value=i.name||''; $('w-cat').value=i.cat||'Other'; $('w-note').value=i.note||''; $('w-emoji').value=i.emoji||''; openModal('wish');};
window.saveWish=()=>{const name=$('w-name').value.trim(); if(!name)return toast('場所名を入力してください'); const key=$('w-key').value; const item={name,cat:$('w-cat').value,note:$('w-note').value.trim(),emoji:$('w-emoji').value.trim()||'✨',updatedBy:window._currentUser,updatedAt:Date.now()}; key?update(ref(db,'wishlist/'+key),item):push(ref(db,'wishlist'),{...item,votes:0,addedBy:window._currentUser,createdAt:Date.now()}); closeModal('wish'); toast('保存しました');};
window.voteWish=(key,current)=>update(ref(db,'wishlist/'+key),{votes:(current||0)+1}); window.deleteWish=key=>{if(confirm('削除しますか？'))remove(ref(db,'wishlist/'+key));}; onValue(ref(db,'wishlist'),s=>renderWish(s.val()));

function renderNotes(data){ notesData=data||{}; const items=Object.entries(notesData).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)); $('notesList').innerHTML=items.length?items.map(([key,item])=>`<div class="note-card"><div class="note-header"><div class="avatar" style="width:28px;height:28px;font-size:12px">${esc((item.author||'?')[0])}</div><div class="note-name">${esc(item.author||'')}</div><div class="note-time">${item.createdAt?new Date(item.createdAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):''}</div></div><div class="note-text">${esc(item.text)}</div><div class="meta">${meta(item)}</div><div class="actions" style="margin-top:10px"><button class="icon-btn" onclick="editNote('${key}')">Edit</button><button class="icon-btn" onclick="deleteNote('${key}')">✕</button></div></div>`).join(''):'<div class="empty-state">まだコメントがありません</div>'; }
window.postNote=()=>{const text=$('noteInput').value.trim(); if(!text)return toast('コメントを入力してください'); push(ref(db,'notes'),{text,author:$('noteAuthor').value,addedBy:$('noteAuthor').value,createdAt:Date.now()}); $('noteInput').value='';};
window.editNote=key=>{const i=notesData[key]; if(!i)return; $('n-key').value=key; $('n-text').value=i.text||''; $('n-author').value=i.author||window._currentUser; openModal('note');}; window.saveNoteEdit=()=>{const key=$('n-key').value; update(ref(db,'notes/'+key),{text:$('n-text').value.trim(),author:$('n-author').value,updatedBy:window._currentUser,updatedAt:Date.now()}); closeModal('note');}; window.deleteNote=key=>{if(confirm('削除しますか？'))remove(ref(db,'notes/'+key));}; onValue(ref(db,'notes'),s=>renderNotes(s.val()));

function renderPayments(data){ paymentData=data||{}; const items=Object.entries(paymentData).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)); $('paymentList').innerHTML=items.length?items.map(([key,item])=>`<div class="expense-card"><div class="expense-emoji">${esc(item.emoji||'💳')}</div><div><div class="expense-title">${esc(item.desc)}</div><div class="expense-sub">Paid by ${esc(item.paidBy||'')}</div><span class="status-badge ${item.status==='settled'?'status-settled':'status-pending'}">${item.status==='settled'?'Settled':'Pending'}</span><div class="meta">${meta(item)}</div></div><div class="expense-amount">€${Number(item.amount||0).toFixed(2)}</div><div class="actions"><button class="icon-btn" onclick="editPayment('${key}')">Edit</button><button class="icon-btn" onclick="deletePayment('${key}')">✕</button></div></div>`).join(''):'<div class="empty-state">Paymentはまだありません</div>'; }
window.openPaymentModal=()=>{ $('paymentModalTitle').textContent='Payment に追加'; ['p-key','p-desc','p-amount','p-emoji'].forEach(id=>$(id).value=''); $('p-paidby').value=window._currentUser; $('p-status').value='pending'; openModal('payment');};
window.editPayment=key=>{const i=paymentData[key]; if(!i)return; $('paymentModalTitle').textContent='Paymentを編集'; $('p-key').value=key; $('p-desc').value=i.desc||''; $('p-amount').value=i.amount||''; $('p-paidby').value=i.paidBy||window._currentUser; $('p-emoji').value=i.emoji||''; $('p-status').value=i.status||'pending'; openModal('payment');};
window.savePayment=()=>{const desc=$('p-desc').value.trim(), amount=parseFloat($('p-amount').value); if(!desc||isNaN(amount))return toast('内容と金額を入力してください'); const key=$('p-key').value; const item={desc,amount,paidBy:$('p-paidby').value,emoji:$('p-emoji').value.trim()||'💳',status:$('p-status').value,updatedBy:window._currentUser,updatedAt:Date.now()}; key?update(ref(db,'payments/'+key),item):push(ref(db,'payments'),{...item,addedBy:window._currentUser,createdAt:Date.now()}); closeModal('payment');};
window.deletePayment=key=>{if(confirm('削除しますか？'))remove(ref(db,'payments/'+key));}; onValue(ref(db,'payments'),s=>renderPayments(s.val()));

async function cleanupSamplesOnce(){ const done=await get(ref(db,'_cleanup_v2')); if(done.val())return; const wl=await get(ref(db,'wishlist')); if(wl.val()) Object.entries(wl.val()).forEach(([k,v])=>{ if(v.addedBy==='System') remove(ref(db,'wishlist/'+k)); }); const bd=await get(ref(db,'budget')); if(bd.val()) Object.entries(bd.val()).forEach(([k,v])=>{ if(v.addedBy==='System') remove(ref(db,'budget/'+k)); }); const nt=await get(ref(db,'notes')); if(nt.val()) Object.entries(nt.val()).forEach(([k,v])=>{ const sample=(v.text||'').includes('Sagrada Família ASAP')||(v.text||'').includes('Where should we stay')||(v.text||'').includes('pack heat gear')||(v.text||'').includes('tapas spots'); if(v.addedBy==='System'||sample) remove(ref(db,'notes/'+k)); }); await set(ref(db,'_cleanup_v2'),true); }
initUI(); cleanupSamplesOnce().finally(()=>setTimeout(()=>$('loading').classList.remove('show'),600));
</script>
