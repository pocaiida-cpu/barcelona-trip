<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcelona Trip 2025 🌞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --sun: #F5A623;
  --sky: #2E86AB;
  --terra: #C0392B;
  --sand: #FAF3E0;
  --dark: #1A1A2E;
  --mid: #4A4A6A;
  --light: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --radius: 16px;
  --tab-h: 60px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sand);
  color: var(--dark);
  min-height: 100vh;
  padding-bottom: calc(var(--tab-h) + 24px);
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--sky) 0%, #1a5276 100%);
  color: #fff;
  padding: 28px 20px 20px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.header-inner { position: relative; }
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.header-sub { font-size: 13px; opacity: 0.85; margin-bottom: 12px; }
.header-address {
  font-size: 12px;
  background: rgba(255,255,255,0.15);
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px;
  backdrop-filter: blur(4px);
}
.member-row {
  display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
}
.member-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.18);
  border-radius: 20px; padding: 4px 10px 4px 4px;
  font-size: 12px; cursor: pointer;
  transition: background 0.2s;
}
.member-badge:hover { background: rgba(255,255,255,0.28); }
.member-badge.active { background: rgba(255,255,255,0.35); font-weight: 600; }
.avatar {
  width: 26px; height: 26px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.av-Y { background: var(--sun); }
.av-M { background: #8E44AD; }
.av-R { background: var(--terra); }
.av-S { background: #27AE60; }
.av-K { background: #E67E22; }

/* ── Tabs ── */
.tabs {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--border);
  display: flex;
  height: var(--tab-h);
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; font-size: 10px; color: var(--mid);
  cursor: pointer; transition: color 0.2s;
  border: none; background: none;
  -webkit-tap-highlight-color: transparent;
}
.tab.active { color: var(--sky); }
.tab-icon { font-size: 20px; }

/* ── Pages ── */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── Section title ── */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.btn-add {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  background: var(--sky); color: #fff;
  border: none; border-radius: 20px;
  padding: 6px 14px; cursor: pointer;
  transition: opacity 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.btn-add:hover { opacity: 0.85; }

/* ── Cards ── */
.card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 12px;
  overflow: hidden;
}

/* ── Schedule ── */
.day-header {
  padding: 10px 16px;
  background: linear-gradient(90deg, var(--sky) 0%, #1a5276 100%);
  color: #fff; font-size: 13px; font-weight: 500;
  display: flex; justify-content: space-between; align-items: center;
}
.day-num { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.schedule-items { padding: 0; }
.schedule-item {
  display: flex; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  align-items: flex-start; position: relative;
}
.schedule-item:last-child { border-bottom: none; }
.time-col {
  font-size: 11px; color: var(--sky); font-weight: 600;
  min-width: 38px; padding-top: 2px;
  white-space: nowrap;
}
.item-body { flex: 1; }
.item-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.item-sub { font-size: 12px; color: var(--mid); }
.tag {
  display: inline-block;
  font-size: 10px; padding: 2px 8px;
  border-radius: 10px; font-weight: 600; margin-top: 4px;
}
.tag-must { background: #FDEBD0; color: #E67E22; }
.tag-arch { background: #D6EAF8; color: var(--sky); }
.tag-food { background: #D5F5E3; color: #27AE60; }
.tag-gaudi { background: #E8DAEF; color: #8E44AD; }
.item-delete {
  background: none; border: none; cursor: pointer;
  color: #ccc; font-size: 16px; padding: 2px;
  transition: color 0.2s; opacity: 0;
}
.schedule-item:hover .item-delete { opacity: 1; }
.item-delete:hover { color: var(--terra); }

.add-to-day {
  width: 100%; padding: 10px;
  background: none; border: none;
  color: var(--sky); font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: background 0.2s;
}
.add-to-day:hover { background: rgba(46,134,171,0.06); }

/* ── Wish List ── */
.wish-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 12px;
}
.wish-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px;
  position: relative;
}
.wish-popular {
  position: absolute; top: 8px; right: 8px;
  background: var(--sun); color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 8px;
}
.wish-emoji { font-size: 28px; margin-bottom: 6px; }
.wish-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.wish-cat { font-size: 11px; color: var(--mid); margin-bottom: 8px; }
.wish-vote-row { display: flex; align-items: center; gap: 8px; }
.vote-btn {
  border: none; background: none; cursor: pointer;
  font-size: 18px; transition: transform 0.15s;
  padding: 0; line-height: 1;
}
.vote-btn:hover { transform: scale(1.2); }
.vote-count { font-size: 12px; color: var(--mid); font-weight: 500; }
.wish-delete {
  position: absolute; bottom: 8px; right: 8px;
  background: none; border: none; cursor: pointer;
  color: #ddd; font-size: 14px; transition: color 0.2s;
}
.wish-delete:hover { color: var(--terra); }

.add-wish-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  cursor: pointer; transition: background 0.2s; min-height: 120px;
  border: 2px dashed rgba(46,134,171,0.25);
  color: var(--sky);
}
.add-wish-card:hover { background: rgba(46,134,171,0.04); }
.add-wish-card span { font-size: 24px; }
.add-wish-card p { font-size: 12px; }

/* ── Notes ── */
.note-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px 16px;
  margin-bottom: 10px; position: relative;
}
.note-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.note-name { font-size: 13px; font-weight: 600; }
.note-time { font-size: 11px; color: var(--mid); margin-left: auto; }
.note-text { font-size: 13px; line-height: 1.6; color: var(--dark); }
.note-delete {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; cursor: pointer;
  color: #ddd; font-size: 14px; transition: color 0.2s;
}
.note-delete:hover { color: var(--terra); }

.note-compose {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px;
  margin-top: 12px;
}
.note-compose textarea {
  width: 100%; border: 1px solid var(--border);
  border-radius: 10px; padding: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; resize: none;
  outline: none; min-height: 72px;
}
.note-compose textarea:focus { border-color: var(--sky); }
.note-compose-row {
  display: flex; justify-content: space-between;
  align-items: center; margin-top: 8px;
}
.name-select {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 10px; outline: none;
  color: var(--dark);
}
.btn-post {
  background: var(--sky); color: #fff;
  border: none; border-radius: 20px;
  padding: 8px 18px; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity 0.2s;
}
.btn-post:hover { opacity: 0.85; }

/* ── Budget ── */
.budget-summary {
  background: linear-gradient(135deg, var(--sky) 0%, #1a5276 100%);
  color: #fff; border-radius: var(--radius);
  padding: 18px; margin-bottom: 12px;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 10px; text-align: center;
}
.budget-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
}
.budget-label { font-size: 10px; opacity: 0.8; margin-top: 2px; }
.expense-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  position: relative;
}
.expense-emoji { font-size: 24px; }
.expense-body { flex: 1; }
.expense-title { font-size: 13px; font-weight: 600; }
.expense-sub { font-size: 11px; color: var(--mid); }
.expense-right { text-align: right; }
.expense-amount { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--sky); }
.expense-per { font-size: 10px; color: var(--mid); }
.status-badge {
  display: inline-block; font-size: 10px;
  padding: 2px 8px; border-radius: 8px; font-weight: 600;
  margin-top: 3px;
}
.status-pending { background: #FDEBD0; color: #E67E22; }
.status-settled { background: #D5F5E3; color: #27AE60; }
.expense-delete {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; cursor: pointer;
  color: #ddd; font-size: 14px; transition: color 0.2s;
}
.expense-delete:hover { color: var(--terra); }

/* ── Share ── */
.share-box {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 16px;
  margin-top: 12px;
}
.share-label { font-size: 12px; color: var(--mid); margin-bottom: 8px; }
.share-url-row { display: flex; gap: 8px; }
.share-url-input {
  flex: 1; border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 10px;
  font-size: 12px; background: var(--sand);
  outline: none; color: var(--mid);
}
.btn-copy {
  background: var(--sun); color: #fff;
  border: none; border-radius: 10px;
  padding: 8px 14px; font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: opacity 0.2s;
}
.btn-copy:hover { opacity: 0.85; }

/* ── Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: #fff; border-radius: 20px 20px 0 0;
  padding: 24px 20px; width: 100%; max-width: 500px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; margin-bottom: 16px;
}
.modal label { font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px; margin-top: 10px; color: var(--mid); }
.modal input, .modal select, .modal textarea {
  width: 100%; border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; outline: none;
}
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--sky); }
.modal-row { display: flex; gap: 10px; margin-top: 16px; }
.btn-cancel {
  flex: 1; background: var(--sand); color: var(--mid);
  border: none; border-radius: 12px; padding: 12px;
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.btn-submit {
  flex: 2; background: var(--sky); color: #fff;
  border: none; border-radius: 12px; padding: 12px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: opacity 0.2s;
}
.btn-submit:hover { opacity: 0.85; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: calc(var(--tab-h) + 12px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--dark); color: #fff;
  font-size: 13px; padding: 10px 20px;
  border-radius: 20px; opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 300; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Loading ── */
.loading-overlay {
  display: none; position: fixed; inset: 0;
  background: var(--sand);
  z-index: 500; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(46,134,171,0.2);
  border-top-color: var(--sky);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--mid); }

/* ── Realtime indicator ── */
.realtime-dot {
  display: inline-block; width: 7px; height: 7px;
  background: #27AE60; border-radius: 50%;
  margin-right: 5px; animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.sync-status {
  font-size: 11px; color: rgba(255,255,255,0.75);
  display: flex; align-items: center; margin-top: 8px;
}

.empty-state {
  text-align: center; padding: 32px 16px;
  color: var(--mid); font-size: 13px;
}
.empty-state .emoji { font-size: 40px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay show" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">データを読み込み中… 🌞</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <h1>Barcelona Trip 2025 🌞</h1>
    <div class="header-sub">Jun 30 – Aug 1 · 33 days</div>
    <div class="header-address">📍 Carrer de Girona 108, Barcelona 08009</div>
    <div class="member-row" id="memberRow">
      <div class="member-badge active" data-name="Yuka" onclick="selectMember(this,'Yuka')">
        <div class="avatar av-Y">Y</div>Yuka
      </div>
      <div class="member-badge" data-name="Miki" onclick="selectMember(this,'Miki')">
        <div class="avatar av-M">M</div>Miki
      </div>
      <div class="member-badge" data-name="Risa" onclick="selectMember(this,'Risa')">
        <div class="avatar av-R">R</div>Risa
      </div>
      <div class="member-badge" data-name="Saki" onclick="selectMember(this,'Saki')">
        <div class="avatar av-S">S</div>Saki
      </div>
    </div>
    <div class="sync-status"><span class="realtime-dot"></span>リアルタイム同期中</div>
  </div>
</div>

<!-- Pages -->
<div class="page active" id="page-schedule">
  <div class="section-title">
    📅 Schedule
    <button class="btn-add" onclick="openModal('schedule')">＋ Add</button>
  </div>
  <div id="scheduleList"></div>
</div>

<div class="page" id="page-wishlist">
  <div class="section-title">📍 Wish List
    <button class="btn-add" onclick="openModal('wish')">＋ Add</button>
  </div>
  <div class="wish-grid" id="wishGrid"></div>
</div>

<div class="page" id="page-notes">
  <div class="section-title">💬 Notes</div>
  <div id="notesList"></div>
  <div class="note-compose card">
    <textarea id="noteInput" placeholder="コメントを入力…" rows="3"></textarea>
    <div class="note-compose-row">
      <select class="name-select" id="noteAuthor">
        <option>Yuka</option>
        <option>Miki</option>
        <option>Risa</option>
        <option>Saki</option>
      </select>
      <button class="btn-post" onclick="postNote()">Post 💬</button>
    </div>
  </div>
</div>

<div class="page" id="page-budget">
  <div class="section-title">💰 Budget
    <button class="btn-add" onclick="openModal('budget')">＋ Add</button>
  </div>
  <div class="budget-summary" id="budgetSummary">
    <div><div class="budget-num" id="totalAmt">€0</div><div class="budget-label">Group total</div></div>
    <div><div class="budget-num" id="perPerson">€0</div><div class="budget-label">Per person (÷5)</div></div>
    <div><div class="budget-num">€800</div><div class="budget-label">Budget guide</div></div>
  </div>
  <div id="expenseList"></div>
  <div class="share-box">
    <div class="share-label">Share link:</div>
    <div class="share-url-row">
      <input class="share-url-input" id="shareUrl" readonly value="">
      <button class="btn-copy" onclick="copyUrl()">Copy</button>
    </div>
  </div>
</div>

<!-- Bottom Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('schedule',this)">
    <span class="tab-icon">📅</span>Schedule
  </button>
  <button class="tab" onclick="switchTab('wishlist',this)">
    <span class="tab-icon">📍</span>Wish List
  </button>
  <button class="tab" onclick="switchTab('notes',this)">
    <span class="tab-icon">💬</span>Notes
  </button>
  <button class="tab" onclick="switchTab('budget',this)">
    <span class="tab-icon">💰</span>Budget
  </button>
</div>

<!-- ── Modals ── -->
<!-- Schedule Modal -->
<div class="modal-bg" id="modal-schedule">
  <div class="modal">
    <h3>スケジュールに追加</h3>
    <label>場所・アクティビティ</label>
    <input type="text" id="s-title" placeholder="例: サグラダファミリア">
    <label>日程</label>
    <select id="s-day">
      <option value="1">Day 1 (Jun 30)</option>
      <option value="2">Day 2 (Jul 1)</option>
      <option value="3">Day 3 (Jul 2)</option>
      <option value="4">Day 4 (Jul 3)</option>
      <option value="5">Day 5 (Jul 4)</option>
      <option value="6">Day 6+</option>
      <option value="33">Day 33 (Aug 1)</option>
    </select>
    <label>時間 (任意)</label>
    <input type="text" id="s-time" placeholder="例: 09:00">
    <label>メモ (任意)</label>
    <input type="text" id="s-note" placeholder="例: チケット要予約">
    <label>タグ</label>
    <select id="s-tag">
      <option value="">なし</option>
      <option value="must">Must-see!</option>
      <option value="arch">Architecture</option>
      <option value="food">Food</option>
      <option value="gaudi">Gaudí</option>
    </select>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeModal('schedule')">キャンセル</button>
      <button class="btn-submit" onclick="addSchedule()">追加</button>
    </div>
  </div>
</div>

<!-- Wish Modal -->
<div class="modal-bg" id="modal-wish">
  <div class="modal">
    <h3>Wish List に追加</h3>
    <label>場所名</label>
    <input type="text" id="w-name" placeholder="例: ピカソ美術館">
    <label>カテゴリ</label>
    <select id="w-cat">
      <option>Architecture</option>
      <option>Food &amp; Dining</option>
      <option>Art &amp; Culture</option>
      <option>Beach &amp; Nature</option>
      <option>Shopping</option>
      <option>Other</option>
    </select>
    <label>絵文字</label>
    <input type="text" id="w-emoji" placeholder="🏛️" maxlength="2">
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeModal('wish')">キャンセル</button>
      <button class="btn-submit" onclick="addWish()">追加</button>
    </div>
  </div>
</div>

<!-- Budget Modal -->
<div class="modal-bg" id="modal-budget">
  <div class="modal">
    <h3>支出を追加</h3>
    <label>内容</label>
    <input type="text" id="b-desc" placeholder="例: サグラダファミリア チケット">
    <label>金額 (€)</label>
    <input type="number" id="b-amount" placeholder="165">
    <label>支払者</label>
    <select id="b-paidby">
      <option>Yuka</option><option>Miki</option><option>Risa</option><option>Saki</option>
    </select>
    <label>絵文字</label>
    <input type="text" id="b-emoji" placeholder="🏛️" maxlength="2">
    <label>ステータス</label>
    <select id="b-status">
      <option value="pending">Pending</option>
      <option value="settled">Settled</option>
    </select>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeModal('budget')">キャンセル</button>
      <button class="btn-submit" onclick="addExpense()">追加</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, onValue, push, remove, update, set
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgsbX6cW9xjQah8MTbZrzVrabNjSksUGU",
  authDomain: "barcelona-trip-cba1e.firebaseapp.com",
  databaseURL: "https://barcelona-trip-cba1e-default-rtdb.firebaseio.com",
  projectId: "barcelona-trip-cba1e",
  storageBucket: "barcelona-trip-cba1e.firebasestorage.app",
  messagingSenderId: "1088189335983",
  appId: "1:1088189335983:web:4c7a14a4b8fd079318075a",
  measurementId: "G-43Z9Y7K5B2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ─── State ───────────────────────────────────
window._currentUser = 'Yuka';
window._db = db;

// Avatar color map
const AV = { Yuka:'av-Y', Miki:'av-M', Risa:'av-R', Saki:'av-S', You:'av-Y' };
const AV_LETTER = { Yuka:'Y', Miki:'M', Risa:'R', Saki:'S', You:'Y' };

// ─── Helpers ─────────────────────────────────
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
};

window.selectMember = (el, name) => {
  document.querySelectorAll('.member-badge').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  window._currentUser = name;
  document.getElementById('noteAuthor').value = name;
};

window.switchTab = (tab, el) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  el.classList.add('active');
};

window.openModal = (type) => {
  document.getElementById('modal-'+type).classList.add('open');
};
window.closeModal = (type) => {
  document.getElementById('modal-'+type).classList.remove('open');
};
// Close modal on bg click
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click', e=>{ if(e.target===bg) bg.classList.remove('open'); });
});

window.copyUrl = () => {
  const u = document.getElementById('shareUrl').value || location.href;
  navigator.clipboard.writeText(u).then(()=>showToast('URLをコピーしました！'));
};
document.getElementById('shareUrl').value = location.href;

// ─── TAG rendering ────────────────────────────
const tagClass = { must:'tag-must', arch:'tag-arch', food:'tag-food', gaudi:'tag-gaudi' };
const tagLabel = { must:'Must-see!', arch:'Architecture', food:'Food', gaudi:'Gaudí' };

// ─── SCHEDULE ─────────────────────────────────
const dayNames = {
  1:'Day 1　Tue, Jun 30', 2:'Day 2　Wed, Jul 1', 3:'Day 3　Thu, Jul 2',
  4:'Day 4　Fri, Jul 3',  5:'Day 5　Sat, Jul 4', 6:'Day 6+',
  33:'Day 33　Sat, Aug 1'
};
const dayOrder = [1,2,3,4,5,6,33];

let scheduleData = {};

function renderSchedule(data) {
  scheduleData = data || {};
  const container = document.getElementById('scheduleList');
  container.innerHTML = '';

  const grouped = {};
  dayOrder.forEach(d=>{ grouped[d]=[]; });
  Object.entries(scheduleData).forEach(([key,item])=>{
    const d = item.day || 6;
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push({key,...item});
  });

  dayOrder.forEach(dayNum => {
    const items = grouped[dayNum] || [];
    const card = document.createElement('div');
    card.className = 'card';
    card.style.marginBottom = '12px';

    let inner = `<div class="day-header">
      <div><div class="day-num">${dayNum===6?'Day 4–32':dayNames[dayNum]?.split('　')[0]}</div>
      <div style="font-size:11px;opacity:.8">${dayNum===6?'Jul 3–31':dayNames[dayNum]?.split('　')[1]||''}</div></div>
    </div><div class="schedule-items">`;

    if (items.length === 0) {
      inner += `<div style="padding:12px 16px;font-size:12px;color:var(--mid)">TBD — Let's plan together!</div>`;
    } else {
      items.sort((a,b)=>(a.time||'').localeCompare(b.time||'')).forEach(item=>{
        const tagHtml = item.tag
          ? `<span class="tag ${tagClass[item.tag]||''}">${tagLabel[item.tag]||item.tag}</span>`
          : '';
        inner += `<div class="schedule-item">
          <div class="time-col">${item.time||'PM'}</div>
          <div class="item-body">
            <div class="item-title">${item.title}</div>
            ${item.note?`<div class="item-sub">${item.note}</div>`:''}
            ${tagHtml}
          </div>
          <button class="item-delete" onclick="deleteSchedule('${item.key}')">✕</button>
        </div>`;
      });
    }
    inner += `</div><button class="add-to-day" onclick="openAddToDay(${dayNum})">＋ Add to schedule</button>`;
    card.innerHTML = inner;
    container.appendChild(card);
  });
}

window.openAddToDay = (dayNum) => {
  document.getElementById('s-day').value = dayNum;
  openModal('schedule');
};

window.addSchedule = () => {
  const title = document.getElementById('s-title').value.trim();
  if (!title) { showToast('場所名を入力してください'); return; }
  const item = {
    title,
    day: parseInt(document.getElementById('s-day').value),
    time: document.getElementById('s-time').value.trim(),
    note: document.getElementById('s-note').value.trim(),
    tag: document.getElementById('s-tag').value,
    addedBy: window._currentUser,
    createdAt: Date.now()
  };
  push(ref(db, 'schedule'), item);
  closeModal('schedule');
  ['s-title','s-time','s-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('s-tag').value='';
  showToast('スケジュールに追加しました！');
};

window.deleteSchedule = (key) => {
  if (!confirm('削除しますか？')) return;
  remove(ref(db, 'schedule/'+key));
  showToast('削除しました');
};

onValue(ref(db,'schedule'), snap => renderSchedule(snap.val()));

// ─── WISH LIST ────────────────────────────────
function renderWish(data) {
  const grid = document.getElementById('wishGrid');
  grid.innerHTML = '';
  const items = data ? Object.entries(data) : [];

  items.sort((a,b)=>(b[1].votes||0)-(a[1].votes||0)).forEach(([key,item])=>{
    const popular = (item.votes||0) >= 3;
    const card = document.createElement('div');
    card.className = 'wish-card';
    card.innerHTML = `
      ${popular?'<div class="wish-popular">Popular!</div>':''}
      <div class="wish-emoji">${item.emoji||'📍'}</div>
      <div class="wish-name">${item.name}</div>
      <div class="wish-cat">${item.cat||''}</div>
      <div class="wish-vote-row">
        <button class="vote-btn" onclick="voteWish('${key}',${item.votes||0})">♡</button>
        <span class="vote-count">${item.votes||0} votes</span>
      </div>
      <button class="wish-delete" onclick="deleteWish('${key}')">✕</button>
    `;
    grid.appendChild(card);
  });

  // Add card
  const addCard = document.createElement('div');
  addCard.className = 'add-wish-card';
  addCard.onclick = ()=>openModal('wish');
  addCard.innerHTML = `<span>＋</span><p>Add a place</p>`;
  grid.appendChild(addCard);
}

window.voteWish = (key, current) => {
  update(ref(db,'wishlist/'+key), {votes: (current||0)+1});
  showToast('投票しました！');
};

window.deleteWish = (key) => {
  if (!confirm('削除しますか？')) return;
  remove(ref(db,'wishlist/'+key));
};

window.addWish = () => {
  const name = document.getElementById('w-name').value.trim();
  if (!name) { showToast('場所名を入力してください'); return; }
  const emoji = document.getElementById('w-emoji').value.trim() || '📍';
  const cat = document.getElementById('w-cat').value;
  push(ref(db,'wishlist'), {name, cat, emoji, votes:0, addedBy:window._currentUser, createdAt:Date.now()});
  closeModal('wish');
  document.getElementById('w-name').value='';
  document.getElementById('w-emoji').value='';
  showToast('Wish Listに追加しました！');
};

onValue(ref(db,'wishlist'), snap => renderWish(snap.val()));

// ─── NOTES ────────────────────────────────────
function renderNotes(data) {
  const list = document.getElementById('notesList');
  list.innerHTML = '';
  if (!data) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">💬</div>まだコメントがありません</div>';
    return;
  }
  const items = Object.entries(data).sort((a,b)=>a[1].createdAt-b[1].createdAt);
  items.forEach(([key,item])=>{
    const card = document.createElement('div');
    card.className = 'note-card';
    const avCls = AV[item.author] || 'av-Y';
    const avLetter = AV_LETTER[item.author] || item.author?.[0] || '?';
    const date = item.createdAt ? new Date(item.createdAt) : null;
    const timeStr = date ? `${(date.getMonth()+1)}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}` : '';
    card.innerHTML = `
      <div class="note-header">
        <div class="avatar ${avCls}" style="width:28px;height:28px;font-size:12px">${avLetter}</div>
        <div class="note-name">${item.author}</div>
        <div class="note-time">${timeStr}</div>
      </div>
      <div class="note-text">${item.text}</div>
      <button class="note-delete" onclick="deleteNote('${key}')">✕</button>
    `;
    list.appendChild(card);
  });
}

window.postNote = () => {
  const text = document.getElementById('noteInput').value.trim();
  if (!text) { showToast('コメントを入力してください'); return; }
  const author = document.getElementById('noteAuthor').value;
  push(ref(db,'notes'), {text, author, createdAt: Date.now()});
  document.getElementById('noteInput').value = '';
  showToast('投稿しました！');
};

window.deleteNote = (key) => {
  if (!confirm('削除しますか？')) return;
  remove(ref(db,'notes/'+key));
};

onValue(ref(db,'notes'), snap => renderNotes(snap.val()));

// ─── BUDGET ───────────────────────────────────
function renderBudget(data) {
  const list = document.getElementById('expenseList');
  list.innerHTML = '';
  if (!data) { list.innerHTML = '<div class="empty-state"><div class="emoji">💰</div>支出がありません</div>'; updateBudgetSummary(0); return; }
  
  let total = 0;
  const items = Object.entries(data).sort((a,b)=>a[1].createdAt-b[1].createdAt);
  items.forEach(([key,item])=>{
    total += parseFloat(item.amount)||0;
    const per = ((parseFloat(item.amount)||0)/5).toFixed(0);
    const statusCls = item.status==='settled' ? 'status-settled':'status-pending';
    const statusLabel = item.status==='settled' ? 'Settled':'Pending';
    const card = document.createElement('div');
    card.className = 'expense-card';
    card.innerHTML = `
      <div class="expense-emoji">${item.emoji||'💰'}</div>
      <div class="expense-body">
        <div class="expense-title">${item.desc}</div>
        <div class="expense-sub">Paid by ${item.paidBy} · for 5</div>
        <span class="status-badge ${statusCls}">${statusLabel}</span>
      </div>
      <div class="expense-right">
        <div class="expense-amount">€${parseFloat(item.amount).toFixed(0)}</div>
        <div class="expense-per">€${per}/person</div>
      </div>
      <button class="expense-delete" onclick="deleteExpense('${key}')">✕</button>
    `;
    list.appendChild(card);
  });
  updateBudgetSummary(total);
}

function updateBudgetSummary(total) {
  document.getElementById('totalAmt').textContent = '€'+total.toFixed(0);
  document.getElementById('perPerson').textContent = '€'+(total/5).toFixed(0);
}

window.deleteExpense = (key) => {
  if (!confirm('削除しますか？')) return;
  remove(ref(db,'budget/'+key));
};

window.addExpense = () => {
  const desc = document.getElementById('b-desc').value.trim();
  const amount = parseFloat(document.getElementById('b-amount').value);
  if (!desc || isNaN(amount)) { showToast('内容と金額を入力してください'); return; }
  push(ref(db,'budget'), {
    desc, amount,
    paidBy: document.getElementById('b-paidby').value,
    emoji: document.getElementById('b-emoji').value.trim() || '💰',
    status: document.getElementById('b-status').value,
    addedBy: window._currentUser,
    createdAt: Date.now()
  });
  closeModal('budget');
  ['b-desc','b-amount','b-emoji'].forEach(id=>document.getElementById(id).value='');
  showToast('支出を追加しました！');
};

onValue(ref(db,'budget'), snap => renderBudget(snap.val()));

// ─── Seed default data if empty ───────────────
onValue(ref(db,'_initialized'), snap => {
  if (!snap.val()) {
    // Seed schedule
    const schedItems = [
      {title:'Depart Kansai International Airport (KIX)',day:1,time:'AM',note:'KIX → BCN (with connection)',tag:'',addedBy:'System',createdAt:1},
      {title:'Check in — Airbnb',day:1,time:'PM',note:'Carrer de Girona 108, Barcelona 08009',tag:'',addedBy:'System',createdAt:2},

      {title:'Passeig de Gràcia stroll & shopping',day:3,time:'14:00',note:'Casa Milà exterior en route',tag:'',addedBy:'System',createdAt:7},
      {title:'Check out & Depart Barcelona Airport (BCN)',day:33,time:'PM',note:'BCN → KIX',tag:'',addedBy:'System',createdAt:8},
    ];
    schedItems.forEach(i=>push(ref(db,'schedule'),i));

    // Seed wishlist
    const wishes = [
      {name:'Sagrada Família',cat:'Architecture · Gaudí',emoji:'🏛️',votes:5},
      {name:'La Boqueria Market',cat:'Food · Market',emoji:'🥘',votes:4},
      {name:'Barceloneta Beach',cat:'Beach · Sea',emoji:'🏖️',votes:3},
      {name:'Picasso Museum',cat:'Art · Culture',emoji:'🎨',votes:2},
      {name:'Montjuïc Hill',cat:'Nature · Views',emoji:'🌿',votes:3},
      {name:'Plaça de Catalunya',cat:'Sightseeing · Plaza',emoji:'🍷',votes:2},
    ];
    wishes.forEach(w=>push(ref(db,'wishlist'),{...w,addedBy:'System',createdAt:Date.now()}));

    // Seed notes
    const notes = [
      {author:'Yuka',text:"We should book Sagrada Família ASAP! Apparently it gets really crowded in summer — let's grab tickets before July. You can book on the official website 🏛️",createdAt:1719835380000},
      {author:'Miki',text:"Where should we stay? The Passeig de Gràcia area seems really convenient for sightseeing — what does everyone think? 😊",createdAt:1719921660000},
      {author:'Yuka',text:"We should pack heat gear for the little one! Barcelona in July can get above 35°C ☀️ Hats and sunscreen are a must!",createdAt:1719926700000},
      {author:'Risa',text:"I'll research good tapas spots! Apparently the Gothic Quarter has tons of great places 🍢",createdAt:1720018200000},
    ];
    notes.forEach(n=>push(ref(db,'notes'),n));

    // Seed budget
    const expenses = [
      {desc:'Sagrada Família tickets for 5',amount:165,paidBy:'Yuka',emoji:'🏛️',status:'pending',addedBy:'System',createdAt:1},
      {desc:'Dinner (Day 2) for 5',amount:210,paidBy:'Miki',emoji:'🍽️',status:'settled',addedBy:'System',createdAt:2},
    ];
    expenses.forEach(e=>push(ref(db,'budget'),e));

    set(ref(db,'_initialized'), true);
  }

  // Hide loading after first data load
  setTimeout(()=>document.getElementById('loading').classList.remove('show'), 500);
}, { onlyOnce: true });

</script>
